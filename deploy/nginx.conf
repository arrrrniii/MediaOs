# MediaOS — Nginx reverse proxy with origin cache
# Single domain setup: cdn.yourdomain.com handles both API and Dashboard
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/mediaos
#   2. Replace cdn.yourdomain.com with your domain
#   3. sudo mkdir -p /var/cache/nginx/mediaos_originals /var/cache/nginx/mediaos_transforms
#   4. ln -s /etc/nginx/sites-available/mediaos /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# For SSL, use certbot:
#   sudo certbot --nginx -d cdn.yourdomain.com

# Cache zones — place this in http {} block or in a conf.d snippet
proxy_cache_path /var/cache/nginx/mediaos_originals
    levels=1:2 keys_zone=media_originals:20m
    max_size=5g inactive=30d use_temp_path=off;

proxy_cache_path /var/cache/nginx/mediaos_transforms
    levels=1:2 keys_zone=media_transforms:40m
    max_size=10g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name cdn.yourdomain.com;

    client_max_body_size 100M;

    # API routes → Worker (no cache)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # CDN file serving → Worker (cached at edge)
    location /f/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Origin cache for originals
        proxy_cache media_originals;
        proxy_cache_key $host$uri$is_args$args;
        proxy_cache_valid 200 206 30d;
        proxy_cache_valid 404 403 1m;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;

        # Pass cache status header downstream (useful for debugging)
        add_header X-Cache-Status $upstream_cache_status;

        # Allow large files to be buffered
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 1024m;
    }

    # Image resizing → Worker (cached at edge)
    location /img/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Origin cache for transforms
        proxy_cache media_transforms;
        proxy_cache_key $host$uri$is_args$args;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 400 404 403 1m;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 15s;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;

        add_header X-Cache-Status $upstream_cache_status;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 128k;
        proxy_busy_buffers_size 256k;
    }

    # Health check → Worker
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Everything else → Dashboard
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
