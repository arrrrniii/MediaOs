# MediaOS — Nginx reverse proxy
# Single domain setup: cdn.yourdomain.com handles both API and Dashboard
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/mediaos
#   2. Replace cdn.yourdomain.com with your domain
#   3. ln -s /etc/nginx/sites-available/mediaos /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# For SSL, use certbot:
#   sudo certbot --nginx -d cdn.yourdomain.com

server {
    listen 80;
    server_name cdn.yourdomain.com;

    client_max_body_size 100M;

    # API routes → Worker
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # CDN file serving → Worker
    location /f/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream files without buffering
        proxy_buffering off;
    }

    # Image resizing → Worker
    location /img/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # Health check → Worker
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Everything else → Dashboard
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
